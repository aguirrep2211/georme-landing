name: georme-landing

services:
  web:
    image: nginx:1.27-alpine
    container_name: georme-landing-web
    restart: unless-stopped
    volumes:
      - ..:/usr/share/nginx/html:ro
    networks:
      - frontend

  contact-api:
    build:
      context: ../api
    container_name: georme-contact-api
    restart: unless-stopped
    environment:
      ODOO_API_MODE: ${ODOO_API_MODE:-json2}
      ODOO_URL: ${ODOO_URL:-}
      ODOO_DATABASE: ${ODOO_DATABASE:-}
      ODOO_USERNAME: ${ODOO_USERNAME:-}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      ODOO_SOURCE_ID: ${ODOO_SOURCE_ID:-}
      ODOO_TEAM_ID: ${ODOO_TEAM_ID:-}
      ODOO_SCORE_FIELD: ${ODOO_SCORE_FIELD:-}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-600}
    networks:
      - frontend

networks:
  frontend:
    external: true
    name: private-server_frontend
